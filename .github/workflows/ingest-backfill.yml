name: Backfill Historical Data

on:
  workflow_dispatch:  # manual trigger only

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/pyproject.toml

      - name: Install ingestion package
        run: pip install -e "ingestion/"

      - name: Run historical backfill (1990–present)
        run: ingest-backfill
        env:
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY:        ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY:        ${{ secrets.BEA_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Trigger Cloudflare Pages redeploy
        if: success()
        run: |
          if [ -n "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"
            echo "Deploy hook triggered"
          else
            echo "No deploy hook set — skipping redeploy"
          fi
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
