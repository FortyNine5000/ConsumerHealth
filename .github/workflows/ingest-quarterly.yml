name: Ingest Quarterly

on:
  schedule:
    # 15th of Jan, Apr, Jul, Oct at 9:15am ET
    # NY Fed HHDC: Q4 → Feb, Q1 → May, Q2 → Aug, Q3 → Nov (~3 months lag)
    # SLOOS: Jan, Apr, Jul, Oct
    - cron: '15 14 15 1,4,7,10 *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/pyproject.toml

      - name: Install ingestion package
        run: pip install -e "ingestion/"

      - name: Run quarterly ingestion (delinquency, SLOOS, net worth, NY Fed HHDC/SCE)
        run: ingest-quarterly
        env:
          FRED_API_KEY:                ${{ secrets.FRED_API_KEY }}
          TURSO_DATABASE_URL:          ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:            ${{ secrets.TURSO_AUTH_TOKEN }}
          CLOUDFLARE_DEPLOY_HOOK_URL:  ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
