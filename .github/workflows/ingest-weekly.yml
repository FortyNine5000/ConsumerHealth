name: Ingest Weekly

on:
  schedule:
    # Thursdays at 10:30am ET (FRED/BLS release IC4WSA, CCSA, MORTGAGE30US on Thursdays)
    - cron: '30 15 * * 4'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/pyproject.toml

      - name: Install ingestion package
        run: pip install -e "ingestion/"

      - name: Run weekly ingestion (claims, mortgage rates, gas prices)
        run: ingest-weekly
        env:
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY:        ${{ secrets.EIA_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
